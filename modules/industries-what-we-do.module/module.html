<section class="wwd" id="{{ module.section_id }}">
  <div class="wwd__wrap">
    <header class="wwd__header" data-sr>
      <div class="wwd__badge">
        <span class="wwd__badgeLine" aria-hidden="true"></span>
        <span class="wwd__badgeText">{{ module.badge }}</span>
      </div>
      <h2 class="wwd__title">{{ module.title }}</h2>
    </header>

    <div class="wwd__slider" data-wwd-slider style="--wwd-row-height: {{ module.card_height }}px;">
      <div class="wwd__track" data-wwd-track aria-label="{{ module.badge }}">
        {% for card in module.cards %}
          <article
            class="wwd__card{% if loop.first %} is-active{% endif %}"
            style="--wwd-accent: {{ card.accent }};"
            data-wwd-card="{{ loop.index0 }}"
            data-sr
            tabindex="0"
            role="button"
            aria-label="{{ card.title }}"
            aria-expanded="{{ 'true' if loop.first else 'false' }}"
          >
            <div class="wwd__state wwd__state--default" aria-hidden="true">
              <img class="wwd__img" src="{{ card.image.src }}" alt="{{ card.image.alt|default(card.title) }}" loading="lazy" decoding="async">
              <div class="wwd__imgGrad"></div>
              <div class="wwd__imgTitle">{{ card.title }}</div>
            </div>

            <div class="wwd__state wwd__state--hover" aria-hidden="true">
              <div class="wwd__hoverTitle">{{ card.title }}</div>
              <div class="wwd__hoverDesc">{{ card.description }}</div>
            </div>
          </article>
        {% endfor %}
      </div>

      <div class="wwd__nav" aria-label="Capabilities navigation">
        <button class="wwd__navBtn" type="button" aria-label="Previous" data-wwd-prev>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="wwd__count" aria-live="polite">
          <span class="wwd__countCur" data-wwd-cur>1</span>
          <span class="wwd__countSep">/</span>
          <span class="wwd__countTotal" data-wwd-total>{{ module.cards|length }}</span>
        </div>
        <button class="wwd__navBtn" type="button" aria-label="Next" data-wwd-next>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
